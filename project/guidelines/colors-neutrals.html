<!-- @dsCard group="Colors" viewport="700x150" name="Ink & Neutrals" subtitle="テキストと境界線に使うニュートラル階調" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); }
  .row { display: flex; padding: 20px; gap: 0; }
  .sw { flex: 1; height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; box-sizing: border-box; }
  .sw:first-child { border-radius: var(--radius-md) 0 0 var(--radius-md); }
  .sw:last-child { border-radius: 0 var(--radius-md) var(--radius-md) 0; }
  .n { font: var(--micro); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--ink);color:#fff"><span class="n">ink</span></div>
    <div class="sw" style="background:var(--shade-70);color:#fff"><span class="n">70</span></div>
    <div class="sw" style="background:var(--shade-60);color:#fff"><span class="n">60</span></div>
    <div class="sw" style="background:var(--shade-50);color:#fff"><span class="n">50</span></div>
    <div class="sw" style="background:var(--shade-40)"><span class="n">40</span></div>
    <div class="sw" style="background:var(--shade-30)"><span class="n">30</span></div>
    <div class="sw" style="background:var(--shade-20)"><span class="n">20</span></div>
    <div class="sw" style="background:var(--hairline-light)"><span class="n">hairline</span></div>
  </div>
</body>
</html>
