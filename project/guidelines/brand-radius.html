<!-- @dsCard group="Brand" viewport="700x180" name="Radius Scale" subtitle="ボタンは常に pill。カードは lg。" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); color: var(--text-primary); }
  .wrap { padding: 24px 28px; display: flex; gap: 20px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 76px; height: 60px; background: var(--green-10); border: 1px solid var(--green-30); }
  .tag { font: var(--micro); font-family: var(--font-mono); color: var(--text-secondary); }
  .pill { width: 96px; height: 44px; background: var(--ink); border-radius: var(--radius-pill); display:flex; align-items:center; justify-content:center; color:#fff; font: var(--caption); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="tag">xs 4</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="tag">md 8</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="tag">lg 12</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="tag">xl 20</span></div>
    <div class="item"><div class="pill">Button</div><span class="tag">pill ∞</span></div>
  </div>
</body>
</html>
