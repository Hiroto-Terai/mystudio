<!-- @dsCard group="Type" viewport="700x200" name="Font Families" subtitle="Hanken Grotesk（英）× Noto Sans JP（和）" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); color: var(--text-primary); }
  .wrap { padding: 22px 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .box { border: 1px solid var(--border-hairline); border-radius: var(--radius-md); padding: 16px 18px; }
  .name { font: var(--eyebrow); letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 8px; }
  .big-h { font-family: var(--font-display); font-weight: 300; font-size: 40px; line-height: 1.1; }
  .big-j { font-family: var(--font-jp); font-weight: 300; font-size: 34px; line-height: 1.2; }
  .meta { font: var(--caption); color: var(--text-secondary); margin-top: 10px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="box">
      <div class="name">Display · Latin</div>
      <div class="big-h">Hirot Aa Gg 0123</div>
      <div class="meta">Hanken Grotesk · 300–700 · 英語見出し</div>
    </div>
    <div class="box">
      <div class="name">Primary · Japanese</div>
      <div class="big-j">ひろっと あア永 0123</div>
      <div class="meta">Noto Sans JP · 300–700 · 本文・和文全般</div>
    </div>
  </div>
</body>
</html>
