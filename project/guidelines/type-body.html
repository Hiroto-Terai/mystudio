<!-- @dsCard group="Type" viewport="700x230" name="Headings & Body" subtitle="Noto Sans JP — 読みやすい字間・行間" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); color: var(--text-primary); }
  .wrap { padding: 24px 28px; display: flex; flex-direction: column; gap: 12px; }
  .r { display: flex; align-items: baseline; gap: 16px; }
  .tag { font: var(--micro); font-family: var(--font-mono); color: var(--text-tertiary); width: 96px; flex: none; }
  .hxl { font: var(--heading-xl); }
  .hmd { font: var(--heading-md); }
  .blg { font: var(--body-lg); color: var(--text-secondary); }
  .bmd { font: var(--body-md); color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="r"><span class="tag">heading-xl · 28</span><span class="hxl">プラン別の料金</span></div>
    <div class="r"><span class="tag">heading-md · 20</span><span class="hmd">よくあるご質問</span></div>
    <div class="r"><span class="tag">body-lg · 18</span><span class="blg">成果につながるECサイトを、企画からデザイン、運用まで一貫して。</span></div>
    <div class="r"><span class="tag">body-md · 16</span><span class="bmd">初期費用0円から。まずは無料でご相談ください。</span></div>
  </div>
</body>
</html>
