<!-- @dsCard group="Type" viewport="700x150" name="Eyebrow, Caption & Code" subtitle="装飾的な英語アイブロウと補助テキスト" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); color: var(--text-primary); }
  .wrap { padding: 24px 28px; display: flex; flex-direction: column; gap: 14px; }
  .r { display: flex; align-items: baseline; gap: 16px; }
  .tag { font: var(--micro); font-family: var(--font-mono); color: var(--text-tertiary); width: 96px; flex: none; }
  .eb { font: var(--eyebrow); letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: var(--green-60); }
  .cap { font: var(--caption); color: var(--text-secondary); }
  .code { font: var(--code); background: var(--surface-muted); padding: 2px 8px; border-radius: var(--radius-xs); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="r"><span class="tag">eyebrow · 12</span><span class="eb">Featured Collection</span></div>
    <div class="r"><span class="tag">caption · 14</span><span class="cap">※ 表示価格はすべて税込です。送料は地域により異なります。</span></div>
    <div class="r"><span class="tag">code · 15</span><span class="code">--green-50: #2ea36a;</span></div>
  </div>
</body>
</html>
