<!-- @dsCard group="Colors" viewport="700x150" name="Brand Greens" subtitle="成長・EC・成約を象徴するグリーンスケール" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); }
  .row { display: flex; padding: 20px; gap: 0; }
  .sw { flex: 1; height: 92px; border-radius: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; box-sizing: border-box; }
  .sw:first-child { border-radius: var(--radius-md) 0 0 var(--radius-md); }
  .sw:last-child { border-radius: 0 var(--radius-md) var(--radius-md) 0; }
  .n { font: var(--micro); font-family: var(--font-mono); }
  .h { font-size: 10px; font-family: var(--font-mono); opacity: 0.7; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--green-05)"><span class="n">05</span></div>
    <div class="sw" style="background:var(--green-10)"><span class="n">10</span><span class="h">#d8f6e2</span></div>
    <div class="sw" style="background:var(--green-20)"><span class="n">20</span><span class="h">#c1fbd4</span></div>
    <div class="sw" style="background:var(--green-30)"><span class="n">30</span></div>
    <div class="sw" style="background:var(--green-40);color:#fff"><span class="n">40</span></div>
    <div class="sw" style="background:var(--green-50);color:#fff"><span class="n">50</span><span class="h">#2ea36a</span></div>
    <div class="sw" style="background:var(--green-60);color:#fff"><span class="n">60</span><span class="h">#1f7d52</span></div>
    <div class="sw" style="background:var(--green-70);color:#fff"><span class="n">70</span></div>
  </div>
</body>
</html>
