<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces" subtitle="白基調 + 温かみのあるクリーム、まれに使う黒" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); }
  .row { display: flex; padding: 20px; gap: 14px; }
  .sw { flex: 1; height: 96px; border-radius: var(--radius-md); display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; box-sizing: border-box; border: 1px solid var(--border-hairline); }
  .l { font: var(--caption); font-weight: 600; }
  .h { font-size: 11px; font-family: var(--font-mono); color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--canvas-light)"><span class="l">Canvas Light</span><span class="h">#ffffff</span></div>
    <div class="sw" style="background:var(--canvas-cream)"><span class="l">Canvas Cream</span><span class="h">#fbfbf5</span></div>
    <div class="sw" style="background:var(--green-20);border-color:transparent"><span class="l">Featured / Aloe</span><span class="h">#c1fbd4</span></div>
    <div class="sw" style="background:var(--canvas-ink);border-color:transparent"><span class="l" style="color:#fff">Canvas Ink</span><span class="h" style="color:#8f8f88">#0e100f</span></div>
  </div>
</body>
</html>
