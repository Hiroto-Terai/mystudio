<!-- @dsCard group="Brand" viewport="700x200" name="Elevation" subtitle="署名は Level 3 — 重ねた微細シャドウの紙のような光" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); color: var(--text-primary); }
  .wrap { padding: 32px 28px; display: flex; gap: 26px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 120px; height: 84px; background: var(--surface-card); border-radius: var(--radius-lg); }
  .tag { font: var(--micro); font-family: var(--font-mono); color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-1)"></div><span class="tag">shadow-1</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-2)"></div><span class="tag">shadow-2</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-3)"></div><span class="tag">shadow-3 ★</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-4)"></div><span class="tag">shadow-4</span></div>
  </div>
</body>
</html>
