<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); color: var(--text-primary); }
  .wrap { padding: 24px 28px; display: flex; flex-direction: column; gap: 14px; }
  .r { display: flex; align-items: baseline; gap: 16px; }
  .tag { font: var(--micro); font-family: var(--font-mono); color: var(--text-tertiary); width: 92px; flex: none; }
  .d1 { font: var(--display-xl); letter-spacing: -0.01em; }
  .d2 { font: var(--display-lg); }
  .d3 { font: var(--display-md); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="r"><span class="tag">display-xl · 64</span><span class="d1">Grow with Hirot</span></div>
    <div class="r"><span class="tag">display-lg · 48</span><span class="d2">売れる体験を設計</span></div>
    <div class="r"><span class="tag">display-md · 36</span><span class="d3">ブランドを、ひとつ上へ</span></div>
  </div>
</body>
</html>
