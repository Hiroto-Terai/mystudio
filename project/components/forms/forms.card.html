<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); }
  .wrap { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px 28px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Select, Checkbox, Radio, Switch } = window.HirotDesignSystem_e62cf3;
function Demo() {
  return (
    <div className="wrap">
      <Input label="メールアドレス" placeholder="you@example.com" defaultValue="hello@hirot.jp" />
      <Select label="お届け先" defaultValue="tokyo">
        <option value="tokyo">東京都</option>
        <option value="osaka">大阪府</option>
      </Select>
      <Input label="クーポンコード" error="このコードは無効です" defaultValue="SPRING" />
      <div className="stack">
        <Checkbox label="利用規約に同意する" defaultChecked />
        <Radio name="pay" label="クレジットカード" defaultChecked />
        <Radio name="pay" label="代金引換" />
        <Switch label="お得情報を受け取る" defaultChecked />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
